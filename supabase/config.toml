# Supabase local/project config. Referenced by `npx supabase db push` / `supabase start`.
# project_id is the linked project ref (set by `supabase link`); the placeholder
# below is safe to commit and is overwritten on link.
project_id = "berean"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Production origin. Auth redirects (OAuth callback, magic link) return here.
site_url = "https://lanternword.com"
# Every origin allowed to receive an auth redirect: production, the Cloudflare
# Pages *.pages.dev preview origin, and localhost for `npm run dev`. NOTE: this
# file drives the local Supabase CLI. The HOSTED project's allowlist lives in the
# dashboard (Authentication → URL Configuration) and must list the same origins —
# keep them in sync.
additional_redirect_urls = [
  "https://lanternword.com",
  "https://lantern-5jf.pages.dev",
  "http://localhost:5173"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Email OTP (6-digit code) sign-in. Disable magic-link confirmation email so the
# code flow (signInWithOtp + verifyOtp) is the path used.
double_confirm_changes = true
enable_confirmations = false
# OTP length/expiry — 6 digits, valid for 1 hour.
otp_length = 6
otp_expiry = 3600

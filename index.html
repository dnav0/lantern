<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e8" />
    <!-- Browser-tab favicon (SVG, so it stays crisp at any size) and the iOS
         "add to home screen" icon. The PWA manifest (vite.config.ts) references
         the PNGs separately for installed-app icons. -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Lantern — personal Bible study notes</title>
    <!-- Static name + purpose in the raw HTML. The app is a client-rendered SPA,
         so without these a crawler or an OAuth-branding reviewer that doesn't run
         JS sees an empty shell — which reads as "homepage doesn't explain the
         app" and "app name doesn't match". Keep the name "Lantern" and the
         purpose here in sync with the consent screen and the landing copy. -->
    <meta
      name="description"
      content="Lantern is a personal Bible study notes app. Read a passage, capture what you notice — observation, history, application, reflection — and find your notes anchored to the verse the next time you open it."
    />
    <meta property="og:title" content="Lantern — personal Bible study notes" />
    <meta
      property="og:description"
      content="A calm reading Bible with a place to write. Your study stays beside the verse, ready the next time you open the passage."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lanternword.com" />
  </head>
  <body>
    <div id="root">
      <!-- Fallback shown only when JavaScript is unavailable (e.g. a reviewer or
           crawler that doesn't execute the SPA). Real users get the full React
           landing, which replaces #root's contents on mount. -->
      <noscript>
        <h1>Lantern — personal Bible study notes</h1>
        <p>
          Lantern is a calm reading Bible with a place to write. Read a passage,
          capture what you see in it (observation, historical context,
          application, personal reflection), and read those notes back later
          anchored to the verses.
        </p>
        <p><a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms of Use</a></p>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

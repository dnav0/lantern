<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Lantern app icon: a serif "L" on the brand navy.
       The identity is wordmark-only (see src/components/Wordmark.tsx), but the
       OS/PWA still requires a square tile, so the wordmark's initial carries it.

       The L is drawn as OUTLINED SHAPES, not <text>: a favicon renders in
       isolation where the self-hosted Source Serif 4 is not guaranteed to be
       available, so live text could fall back to a different face. -->
  <rect width="512" height="512" rx="110" fill="#1E3358" />
  <g fill="#F4F0E8">
    <!-- top serif -->
    <rect x="174" y="148" width="92" height="24" rx="3" />
    <!-- stem -->
    <rect x="202" y="148" width="36" height="216" />
    <!-- foot / arm -->
    <rect x="202" y="340" width="136" height="24" rx="3" />
    <!-- arm-end serif flare -->
    <rect x="314" y="320" width="24" height="44" rx="3" />
  </g>
</svg>
